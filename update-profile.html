<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật hồ sơ - JobGos Quản lý ứng viên</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/update_profile.css">
</head>
<body>
    <div class="profile-page-wrapper">
        <!-- New Horizontal Header -->
        <header class="site-header">
            <div class="header-container">
                <div class="header-left">
                    <a href="user-dashboard.html" class="logo-text">JobGos</a>
                    <nav class="main-nav">
                        <a href="index.html">Việc làm <span class="nav-caret"></span></a>
                        <a href="update-profile.html" class="active">Hồ sơ</a>
                        <a href="manage-cv.html">Quản lý CV</a>
                        <a href="#">Liên hệ <span class="nav-caret"></span></a>
                    </nav>
                </div>
                
                <div class="header-right">
                    <div class="notify-wrapper">
                        <button class="icon-btn">
                            <img src="assets/images/user-dashboard/ic-notifications.svg" alt="Notifications" width="24">
                            <span class="notify-badge"></span>
                        </button>
                    </div>
                    <div class="header-divider"></div>
                    <div class="header-user-info">
                        <div class="user-text">
                            <span class="user-name">Ninh Khoa</span>
                            <span class="user-role">Ứng viên</span>
                        </div>
                        <div class="user-avatar-header">
                            <img src="assets/images/profile/avatar-user.png" alt="Avatar">
                        </div>
                    </div>
                    <button class="btn-logout">Đăng xuất</button>
                </div>
            </div>
        </header>

        <!-- Main Content (Full Width) -->
        <main class="main-content-profile">

            <!-- Profile Content Area -->
            <div class="profile-container">
                <div class="breadcrumb">
                    <a href="user-dashboard.html">Trang chủ</a>
                    <img src="assets/icons/ic_next.svg" alt=">" width="12">
                    <span>Hồ sơ</span>
                </div>

                <div class="profile-grid">
                    <!-- Left Sidebar Profile -->
                    <div class="profile-left-column">
                        <div class="profile-card profile-avatar-card">
                            <img src="assets/images/profile/avatar-user.png" alt="User Avatar" class="avatar-square">
                        </div>
                        
                        <div class="profile-card cv-status-card">
                            <h3 class="cv-card-title">CV đã được tải lên</h3>
                            <div class="cv-empty-state">
                                <img src="assets/images/profile/upload-cv.png" alt="Upload CV" class="cv-icon-small">
                                <p>Chưa có CV nào</p>
                                <button class="btn-up-cv">Up CV</button>
                            </div>
                        </div>
                    </div>

                    <!-- Right Form Column -->
                    <div class="profile-card profile-form-card">
                        <h2 class="form-title">Thông tin cá nhân</h2>
                        <form class="profile-form">
                            <div class="form-stacked-grid">
                                <div class="form-group">
                                    <label>Họ và tên</label>
                                    <input type="text" value="Ninh Khoa" placeholder="Nhập họ và tên">
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại</label>
                                    <input type="text" value="0358993432" placeholder="Nhập số điện thoại">
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" value="khoaninh3012@gmail.com" placeholder="Nhập email">
                                </div>
                                <div class="form-group">
                                    <label>Mục tiêu</label>
                                    <textarea placeholder="Nhập mục tiêu nghề nghiệp" rows="4"></textarea>
                                </div>
                            </div>
                            <div class="form-footer">
                                <button type="submit" class="btn-save-profile">Chỉnh sửa hồ sơ</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
